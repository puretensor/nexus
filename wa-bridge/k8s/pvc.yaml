apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wa-bridge-1-auth
  namespace: nexus
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: rbd-ssd
  resources:
    requests:
      storage: 100Mi

