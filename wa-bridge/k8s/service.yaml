apiVersion: v1
kind: Service
metadata:
  name: wa-bridge-1
  namespace: nexus
spec:
  type: ClusterIP
  selector:
    app: wa-bridge
    instance: wa-1
  ports:
    - name: http
      port: 3100
      targetPort: 3100
      protocol: TCP

